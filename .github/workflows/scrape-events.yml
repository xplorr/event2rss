name: Scrape Events to RSS

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install puppeteer xml
      
      - name: Create data directory
        run: mkdir -p data rss
      
      - name: Scrape events
        run: node scrape.js
      
      - name: Generate RSS
        run: node json-to-rss.js
      
      - name: Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add rss/events.xml || true
          git add data/events.json || true
          git commit -m "Update events RSS" || true
          git push
