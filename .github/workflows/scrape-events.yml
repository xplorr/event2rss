name: Scrape Events to RSS
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm' # Optional: Caches your npm modules for even faster runs

      # NOTE: The "Install Chromium" step has been completely removed.
      # Google Chrome is already pre-installed at /usr/bin/google-chrome

      - name: Install dependencies
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
        run: |
          npm config set fetch-retries 3
          npm config set fetch-retry-mintimeout 5000
          npm config set fetch-retry-maxtimeout 20000
          npm install puppeteer xml
        timeout-minutes: 10

      - name: Scrape events
        run: node scrape.js
        timeout-minutes: 10

      - name: Generate RSS
        run: node json-to-rss.js

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/events.json rss/events.xml || true
          git diff --staged --quiet || git commit -m "Update events RSS $(date)"
          git push
