name: Scrape Events to RSS

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Cache Puppeteer browser downloads (BIG speed boost)
      - name: Cache Puppeteer browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: ${{ runner.os }}-puppeteer

      - name: Install dependencies
        run: |
          npm config set fetch-retries 3
          npm config set fetch-retry-mintimeout 5000
          npm config set fetch-retry-maxtimeout 20000
          npm install puppeteer xml

      - name: Scrape events
        run: node scrape.js
        timeout-minutes: 30

      - name: Generate RSS
        run: node json-to-rss.js

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/events.json rss/events.xml || true
          git diff --staged --quiet || git commit -m "Update events RSS $(date)"
          git push
