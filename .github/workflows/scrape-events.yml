name: Scrape Events to RSS
on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC
  workflow_dispatch:     # Manual trigger option

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Chromium (system package, fast & reliable)
        run: sudo apt-get update && sudo apt-get install -y chromium-browser

      - name: Install dependencies
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
        run: |
          npm config set fetch-retries 3
          npm config set fetch-retry-mintimeout 5000
          npm config set fetch-retry-maxtimeout 20000
          npm install puppeteer xml
        timeout-minutes: 5

      - name: Scrape (debug mode)
        run: node scrape.js
        timeout-minutes: 3

      - name: Commit and push debug output
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add debug-info.json || true
          git commit -m "Update debug info $(date)" || true
          git push
